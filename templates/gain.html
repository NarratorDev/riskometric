<!-- gain.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gain Scenario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h1>Question 1 — Gain Scenario</h1>

    <form action="/loss" method="POST">

        <div class="card bg-secondary p-4 mt-4">

            <h3>Select ONE option:</h3>

            <div class="form-check mt-3">

                <input class="form-check-input"
                       type="radio"
                       name="gain_choice"
                       value="A"
                       required>

                <label class="form-check-label">

                    Guaranteed gain of ₹500

                </label>

            </div>

            <div class="form-check mt-3">

                <input class="form-check-input"
                       type="radio"
                       name="gain_choice"
                       value="B">

                <label class="form-check-label">

                    50% chance of gaining ₹1100 and 50% chance of gaining ₹0

                </label>

            </div>

            <button class="btn btn-primary mt-4">

                Continue

            </button>

        </div>

    </form>

</div>

</body>

</html>
