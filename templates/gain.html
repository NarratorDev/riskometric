<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gain Scenario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .scenario-card {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 20px;
            width: 700px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .option-box {
            background-color: #334155;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .option-box:hover {
            background-color: #475569;
            transform: scale(1.02);
        }

        input[type="radio"] {
            transform: scale(1.5);
            margin-right: 15px;
        }

        label {
            font-size: 20px;
            cursor: pointer;
        }

        .next-btn {
            width: 100%;
            padding: 15px;
            background-color: #22c55e;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            color: white;
            margin-top: 20px;
            transition: 0.3s;
        }

        .next-btn:hover {
            background-color: #16a34a;
        }

    </style>

</head>

<body>

<div class="scenario-card">

    <h1>Round 1 — Gain Scenario</h1>

    <form action="/loss" method="POST">

        <div class="option-box">

            <label>

                <input type="radio" name="gain_choice" value="A" required>

                Guaranteed gain of ₹500

            </label>

        </div>

        <div class="option-box">

            <label>

                <input type="radio" name="gain_choice" value="B">

                50% chance of gaining ₹1100 and 50% chance of gaining ₹0

            </label>

        </div>

        <button type="submit" class="next-btn">
            Continue
        </button>

    </form>

</div>

</body>

</html>
