<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Riskometric Test</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .main-card {
            background-color: #1e293b;
            padding: 50px;
            border-radius: 20px;
            width: 500px;
            text-align: center;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        .start-btn {
            background-color: #3b82f6;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 12px;
            color: white;
            transition: 0.3s;
        }

        .start-btn:hover {
            background-color: #2563eb;
            transform: scale(1.05);
        }

    </style>

</head>

<body>

    <div class="main-card">

        <h1>Riskometric Test</h1>

        <p>
            Explore how psychology influences financial decision-making.
        </p>

        <a href="/gain">

            <button class="start-btn">
                Start Experiment
            </button>

        </a>

    </div>

</body>

</html>
