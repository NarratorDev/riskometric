<!-- overconfidence.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Overconfidence Bias</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h1>Question 6 — Overconfidence Bias</h1>

    <form action="/submit" method="POST">

        <input type="hidden"
               name="gain_choice"
               value="{{ gain_choice }}">

        <input type="hidden"
               name="loss_choice"
               value="{{ loss_choice }}">

        <input type="hidden"
               name="certainty_choice"
               value="{{ certainty_choice }}">

        <input type="hidden"
               name="sunkcost_choice"
               value="{{ sunkcost_choice }}">

        <input type="hidden"
               name="herd_choice"
               value="{{ herd_choice }}">

        <div class="card bg-secondary p-4 mt-4">

            <h3>You made profits in your last 5 trades.</h3>

            <div class="form-check mt-3">

                <input class="form-check-input"
                       type="radio"
                       name="overconfidence_choice"
                       value="A"
                       required>

                <label class="form-check-label">

                    Maintain same investment strategy

                </label>

            </div>

            <div class="form-check mt-3">

                <input class="form-check-input"
                       type="radio"
                       name="overconfidence_choice"
                       value="B">

                <label class="form-check-label">

                    Increase investment risk aggressively

                </label>

            </div>

            <button class="btn btn-danger mt-4">

                Submit Assessment

            </button>

        </div>

    </form>

</div>

</body>

</html>
