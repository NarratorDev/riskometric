<!-- certainty.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Certainty Effect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h1>Question 3 — Certainty Effect</h1>

    <form action="/sunkcost" method="POST">

        <input type="hidden" name="gain_choice" value="{{ gain_choice }}">
        <input type="hidden" name="loss_choice" value="{{ loss_choice }}">

        <div class="card bg-secondary p-4 mt-4">

            <h3>Select ONE option:</h3>

            <div class="form-check mt-3">

                <input class="form-check-input"
                       type="radio"
                       name="certainty_choice"
                       value="A"
                       required>

                <label class="form-check-label">

                    Guaranteed ₹900 gain

                </label>

            </div>

            <div class="form-check mt-3">

                <input class="form-check-input"
                       type="radio"
                       name="certainty_choice"
                       value="B">

                <label class="form-check-label">

                    90% chance of gaining ₹1000

                </label>

            </div>

            <button class="btn btn-primary mt-4">

                Continue

            </button>

        </div>

    </form>

</div>

</body>

</html>
